<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Online Book Store</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.tailwindcss.com/3.4.17"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+Pro:wght@400;600&display=swap" rel="stylesheet">

</head>

<body class="h-full font-body">

<div id="app">

<!-- LOGIN SCREEN -->

<div id="login-screen">

<h1 id="store-title">PageTurner Books</h1>
<p id="welcome-text">Discover your next favorite read</p>

<button onclick="showStore()">Login</button>

</div>


<!-- STORE SCREEN -->

<div id="store-screen" class="hidden">

<header>

<h1 id="header-store-name">PageTurner Books</h1>

<button onclick="showCart()">Cart</button>

</header>


<!-- CATEGORY -->

<div>

<button onclick="filterBooks('all')">All</button>
<button onclick="filterBooks('fiction')">Fiction</button>
<button onclick="filterBooks('non-fiction')">Non Fiction</button>
<button onclick="filterBooks('mystery')">Mystery</button>
<button onclick="filterBooks('romance')">Romance</button>

</div>


<!-- BOOKS -->

<div id="books-grid"></div>

</div>


<!-- CART MODAL -->

<div id="cart-modal" class="hidden">

<h2>Your Cart</h2>

<div id="cart-items"></div>

<p>Total: <span id="cart-total">$0</span></p>

<button onclick="checkout()">Checkout</button>

<button onclick="hideCart()">Close</button>

</div>

</div>


<script src="script.js"></script>

</body>
</html>
