<!doctype html>
<html lang="en" class="h-full">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&amp;family=Source+Sans+Pro:wght@400;600&amp;display=swap" rel="stylesheet">
  <style>
    .font-heading { font-family: 'Playfair Display', Georgia, serif; }
    .font-body { font-family: 'Source Sans Pro', Arial, sans-serif; }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    .animate-fade-in {
      animation: fadeIn 0.5s ease-out forwards;
    }
    
    .animate-slide-in {
      animation: slideIn 0.4s ease-out forwards;
    }
    
    .book-card {
      transition: all 0.3s ease;
    }
    
    .book-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    }
    
    .btn-primary {
      transition: all 0.2s ease;
    }
    
    .btn-primary:hover {
      transform: scale(1.02);
    }
    
    .input-field:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3);
    }
    
    .toast {
      animation: slideIn 0.3s ease-out;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
 </head>
